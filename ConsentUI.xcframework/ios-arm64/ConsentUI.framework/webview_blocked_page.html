<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Restricted</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      color: #333;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px 24px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .icon { font-size: 28px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.5; }
    .url {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
      word-break: break-all;
      background: #f0f0f0;
      border-radius: 6px;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F512;</div>
    <h1>Access Restricted</h1>
    <p>This link cannot be opened inside the app because it points to a domain that is not permitted.</p>
    <div class="url" id="blocked-url"></div>
  </div>
  <script>
    (function () {
      if (typeof BLOCKED_URL !== "undefined" && BLOCKED_URL) {
        document.getElementById("blocked-url").textContent = BLOCKED_URL;
      }
    })();
  </script>
</body>
</html>
